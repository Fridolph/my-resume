name: Bug Fix
description: Report or plan a bug fix task
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Problem Summary
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact and Scope
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification Plan
    validations:
      required: true
